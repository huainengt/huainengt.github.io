<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>唐怀能 — 个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 60px 50px;
            max-width: 480px;
            width: 90%;
            text-align: center;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            font-size: 42px;
            color: #fff;
            font-weight: 300;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3);
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .tagline {
            font-size: 15px;
            color: #a0a0c0;
            margin-bottom: 28px;
            letter-spacing: 1px;
        }

        .divider {
            width: 50px;
            height: 2px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            margin: 0 auto 28px;
            border-radius: 1px;
        }

        .bio {
            font-size: 16px;
            line-height: 1.8;
            color: #c0c0d0;
            margin-bottom: 36px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 24px;
            border-radius: 12px;
            text-decoration: none;
            color: #e0e0e0;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.25s ease;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .link:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .email {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
            border-color: rgba(102, 126, 234, 0.4);
        }

        .email:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.35), rgba(118, 75, 162, 0.35));
        }

        .icon {
            width: 20px;
            height: 20px;
            opacity: 0.8;
        }

        .footer {
            margin-top: 36px;
            font-size: 13px;
            color: #606080;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">唐</div>
        <h1>唐怀能</h1>
        <p class="tagline">自由职业者</p>
        <div class="divider"></div>
        <p class="bio">
            热爱自由与创造，追求独立的工作方式。<br>
            在自由职业的道路上探索无限可能。
        </p>
        <div class="links">
            <a href="mailto:huainengt@163.com" class="link email">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="4" width="20" height="16" rx="2"/>
                    <path d="M22 4L12 13L2 4"/>
                </svg>
                huainengt@163.com
            </a>
        </div>
        <p class="footer">&copy; 2026 唐怀能</p>
    </div>
</body>
</html>
